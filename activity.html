<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>活动详情 - Flowerwalk in Beijing</title>
  <style>
    /* 导航栏样式 */
    :root{--petal:#FAF8F5;--ink:#2E2E2E;--line:rgba(46,46,46,.12); --green: #536A50;}
    header{position:fixed;top:0;left:0;width:100%;z-index:999;border-bottom:1px solid var(--line);background:rgba(250,248,245,.95);backdrop-filter:blur(10px)}
    nav{width:95%;max-width:1200px;margin:auto;height:64px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:12px;font-weight:700;color:var(--ink);text-decoration:none}
    .mark{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--petal)}
    .links a{color:var(--ink);text-decoration:none;font-size:14px;margin-left:20px;opacity:0.7}
    .links a:hover{opacity:1}
    
    body { font-family: "PingFang SC", system-ui; background: #fdfcf9; color: var(--ink); margin: 0; padding-top: 100px; }
    .shell { width: min(1100px, 90%); margin: 0 auto; }
    
    /* 活动网格布局 */
    .activity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 40px;
      margin-bottom: 80px;
    }
    .activity-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.3s;
    }
    .activity-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .activity-card img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; }
    .card-content { padding: 20px; }
    
    .btn { background: var(--green); color: white; padding: 10px 20px; border-radius: 999px; border: none; cursor: pointer; font-size: 14px; }

    /* 弹窗样式 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); place-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 12px; width: 320px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--line); border-radius: 6px; }
  </style>
</head>
<body>

<header>
  <nav class="wrap">
    <a class="brand" href="index.html">
      <span class="mark">✿</span>
      <span>Flower Walk Beijing</span>
    </a>
    <div class="links">
      <a href="index.html#map">地图</a>
      <a href="index.html#routes">路线</a>
      <a href="index.html#calendar">花期</a>
      <a href="index.html#ai">AI导览</a>
      <a href="index.html#collection">文创</a>
    </div>
  </nav>
</header>  

<div class="shell">
  <h1>美育活动中心</h1>
  <p>探索并预约您感兴趣的城市自然美育课程</p>
  
  <div class="activity-grid" id="activity-grid">
    </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>填写预约信息</h3>
    <input type="text" id="name" placeholder="您的姓名">
    <input type="tel" id="phone" placeholder="联系电话">
    <button class="btn" onclick="submitBooking()" style="width: 100%">提交预约</button>
  </div>
</div>

<script>
  // 活动数据
  const activities = [
    {
      img: "poster1.jpg",
      title: "春日樱花绘写工作坊",
      meta: "4月15日 | 玉渊潭公园",
      desc: "绘画记录自然的转瞬光影。"
    },
    {
      img: "poster2.jpg",
      title: "花间拓印·自然记录课",
      meta: "5月10日 | 国家植物园",
      desc: "植物锤染技术，留住自然的纹理。"
    }
  ];

  // 渲染函数
  const grid = document.getElementById('activity-grid');
  grid.innerHTML = activities.map(item => `
    <div class="activity-card">
      <img src="${item.img}" alt="${item.title}">
      <div class="card-content">
        <h3>${item.title}</h3>
        <p style="font-size: 12px; color: #666;">${item.meta}</p>
        <p>${item.desc}</p>
        <button class="btn" onclick="openModal()">立即预约</button>
      </div>
    </div>
  `).join("");

  // 弹窗逻辑
  function openModal() { document.getElementById('modal').style.display = 'grid'; }
  function submitBooking() {
    alert("预约成功！我们将通过短信与您确认。");
    document.getElementById('modal').style.display = 'none';
  }
</script>

</body>
</html>
