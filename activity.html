<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>活动详情 - Flowerwalk in Beijing</title>
  <style>
    /* 导航栏样式 */
        :root{--petal:#FAF8F5;--ink:#2E2E2E;--line:rgba(46,46,46,.12);}
        header{position:fixed;top:0;left:0;width:100%;z-index:999;border-bottom:1px solid var(--line);background:rgba(250,248,245,.95);backdrop-filter:blur(10px)}
        nav{width:95%;max-width:1200px;margin:auto;height:64px;display:flex;align-items:center;justify-content:space-between}
        .brand{display:flex;align-items:center;gap:12px;font-weight:700;color:var(--ink);text-decoration:none}
        .mark{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--petal)}
        .links a{color:var(--ink);text-decoration:none;font-size:14px;margin-left:20px;opacity:0.7}
        .links a:hover{opacity:1}
        
        /* 布局调整：页面下移避开导航栏 */
        .page{margin-top:64px; height: calc(100vh - 64px); display: flex; width: 100vw; overflow: hidden;}

        /* 原有样式 */
        * { box-sizing: border-box; }
        html, body { margin: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #f4f7ef; color: #263326; }
        .map-wrap { width: 68%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }
        .title-card { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255, 255, 255, 0.92); padding: 14px 18px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); max-width: 360px; }
        .side-panel { width: 32%; min-width: 340px; height: 100%; padding: 28px; background: linear-gradient(180deg, #fbfcf7 0%, #eef4e6 100%); border-left: 1px solid #dce7d1; overflow-y: auto; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 999px; background: #dfead3; color: #3c5f35; font-size: 12px; margin-bottom: 14px; }
        .info-block { margin-bottom: 18px; padding: 16px; background: rgba(255, 255, 255, 0.72); border: 1px solid #dbe7cf; border-radius: 16px; }
        .hint { margin-top: 24px; padding: 14px; border-radius: 14px; background: #fff7db; color: #6c5a26; font-size: 13px; }
        
        @media (max-width: 800px) {
            .page { flex-direction: column; height: auto; }
            .map-wrap { width: 100%; height: 50vh; }
            .side-panel { width: 100%; height: auto; }
        }
    body { font-family: "PingFang SC", system-ui; background: #fdfcf9; color: var(--ink); margin: 0; padding-top: 80px; }
    .shell { width: min(800px, 90%); margin: 0 auto; }
    
    /* 海报图片区域 */
.poster-placeholder {
  width: 100%; 
  aspect-ratio: 3 / 4; /* 强制 3:4 比例 */
  background: #e0e6e0; 
  border-radius: 16px;
  overflow: hidden; /* 确保图片超出部分不影响圆角 */
  margin-bottom: 32px;
}

.poster-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 自动剪裁填充，保持比例不拉伸 */
}

    .info-card { background: white; padding: 40px; border-radius: 16px; border: 1px solid var(--line); }
    h1 { margin-top: 0; }
    .meta { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    
    .btn { background: var(--green); color: white; padding: 12px 30px; border-radius: 999px; border: none; cursor: pointer; font-size: 16px; }

    /* 弹窗样式 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); place-items: center; z-index: 100; }
    .modal-content { background: white; padding: 30px; border-radius: 12px; width: 320px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--line); border-radius: 6px; }
  </style>
</head>
<body>

<header>
  <nav class="wrap">
    <a class="brand" href="index.html">
      <span class="mark">✿</span>
      <span>Flower Walk Beijing</span>
    </a>
    <div class="links">
      <a href="index.html#map">地图</a>
      <a href="index.html#routes">路线</a>
      <a href="index.html#calendar">花期</a>
      <a href="index.html#ai">AI导览</a>
      <a href="index.html#collection">文创</a>
    </div>
    <button class="theme" id="theme">◐</button>
  </nav>
</header>  
<div class="shell">
  <div class="poster-placeholder">
    <img id="poster-img" src="" alt="活动海报">
  </div>

  <div class="info-card">
    <h1 id="title">加载中...</h1>
    <div class="meta" id="meta"></div>
    <p id="desc"></p>
    <button class="btn" onclick="openModal()">立即预约</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>填写预约信息</h3>
    <input type="text" id="name" placeholder="您的姓名">
    <input type="tel" id="phone" placeholder="联系电话">
    <button class="btn" onclick="submitBooking()" style="width: 100%">提交预约</button>
  </div>
</div>

<script>
  <script>
  // 活动数据库
  const activities = {
    "1": {
      img: "poster1.jpg",
      title: "春日樱花绘写工作坊",
      meta: "时间：2026年4月15日 | 地点：玉渊潭公园 | 人数：20人",
      desc: "我们将深入城市公园，通过绘画记录下那些转瞬即逝的自然光影。"
    },
    "2": {
      img: "poster2.jpg",
      title: "花间拓印·自然记录课",
      meta: "时间：2026年5月10日 | 地点：国家植物园 | 人数：15人",
      desc: "学习传统的植物锤染技术，通过直接敲击将花瓣的自然纹理留在织物上。"
    }
  };

  // 页面加载时根据 URL 参数自动填充内容
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || "1"; // 默认显示第一个
  const data = activities[id];

  document.getElementById('poster-img').src = data.img;
  document.getElementById('title').textContent = data.title;
  document.getElementById('meta').textContent = data.meta;
  document.getElementById('desc').textContent = data.desc;

  // 原有的弹窗逻辑保持不变
  function openModal() { document.getElementById('modal').style.display = 'grid'; }
  function submitBooking() {
    alert("预约成功！");
    document.getElementById('modal').style.display = 'none';
  }
</script>
  function openModal() { document.getElementById('modal').style.display = 'grid'; }
  function submitBooking() {
    alert("预约成功！我们将通过短信与您确认。");
    document.getElementById('modal').style.display = 'none';
  }
</script>

</body>
</html>
